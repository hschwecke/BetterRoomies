<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>BetterRoomies — Find Your Roommate</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --cream: #F9F7F2;
    --ink: #1A1A1A;
    --ink-muted: #6B6B6B;
    --ink-faint: #B0ADA6;
    --accent: #2A5C45;
    --accent-light: #E8F2ED;
    --accent-mid: #4A8C6A;
    --border: rgba(26,26,26,0.1);
    --border-strong: rgba(26,26,26,0.18);
    --white: #FFFFFF;
    --danger: #E24B4A;
  }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    display: flex;
    flex-direction: column;
  }

  /* NAV */
  nav {
    height: 56px;
    background: rgba(249,247,242,0.95);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 1.5rem;
    flex-shrink: 0;
  }
  .nav-logo { font-family: 'Instrument Serif', serif; font-size: 1.25rem; color: var(--ink); text-decoration: none; }
  .nav-logo span { color: var(--accent); }
  .nav-right { display: flex; align-items: center; gap: 1rem; }
  .match-pill {
    display: flex; align-items: center; gap: 6px;
    background: var(--accent-light); color: var(--accent);
    font-size: 0.8rem; font-weight: 500;
    padding: 5px 12px; border-radius: 100px;
  }
  .match-dot { width: 6px; height: 6px; background: var(--accent); border-radius: 50%; }
  .nav-icon { width: 34px; height: 34px; border-radius: 50%; border: 1px solid var(--border-strong); background: var(--white); display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 15px; }

  /* MAIN LAYOUT */
  .app-body {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 1.5rem 1rem;
    overflow: hidden;
  }

  /* CARD STACK */
  .card-stack {
    position: relative;
    width: min(340px, 90vw);
    height: min(440px, 60vh);
    margin-bottom: 2rem;
  }

  .profile-card {
    position: absolute;
    inset: 0;
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 24px;
    overflow: hidden;
    cursor: grab;
    user-select: none;
    will-change: transform;
  }
  .profile-card:active { cursor: grabbing; }

  .card-photo {
    width: 100%;
    height: 62%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 88px;
    flex-shrink: 0;
  }

  .card-info {
    padding: 1rem 1.25rem;
    border-top: 1px solid var(--border);
  }

  .card-name-row {
    display: flex;
    align-items: baseline;
    gap: 8px;
    margin-bottom: 5px;
  }

  .card-name { font-family: 'Instrument Serif', serif; font-size: 1.5rem; color: var(--ink); }
  .card-age { font-size: 1rem; color: var(--ink-muted); }

  .card-city {
    font-size: 0.8375rem;
    color: var(--ink-muted);
    display: flex;
    align-items: center;
    gap: 5px;
  }

  /* STAMP */
  .stamp {
    position: absolute;
    top: 32px;
    font-size: 22px;
    font-weight: 500;
    letter-spacing: 0.05em;
    padding: 6px 14px;
    border-radius: 8px;
    border: 3px solid;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.08s;
  }
  .stamp-like { left: 18px; color: var(--accent); border-color: var(--accent); transform: rotate(-16deg); }
  .stamp-pass { right: 18px; color: var(--danger); border-color: var(--danger); transform: rotate(16deg); }

  /* BACK CARDS */
  .card-z2 { transform: scale(0.95) translateY(12px); z-index: 2; }
  .card-z1 { transform: scale(0.90) translateY(24px); z-index: 1; }
  .card-top { z-index: 10; }

  /* MATCH OVERLAY */
  .match-overlay {
    display: none;
    position: absolute;
    inset: 0;
    background: var(--accent);
    border-radius: 24px;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 2rem;
    z-index: 20;
  }
  .match-overlay.show { display: flex; }
  .match-emoji { font-size: 40px; margin-bottom: 0.75rem; }
  .match-title { font-family: 'Instrument Serif', serif; font-size: 1.75rem; color: white; margin-bottom: 0.35rem; }
  .match-sub { font-size: 0.875rem; color: rgba(255,255,255,0.72); margin-bottom: 1.5rem; }
  .match-avatars { display: flex; gap: 14px; margin-bottom: 1.5rem; }
  .match-avatar { width: 60px; height: 60px; border-radius: 50%; background: rgba(255,255,255,0.18); display: flex; align-items: center; justify-content: center; font-size: 30px; border: 2px solid rgba(255,255,255,0.4); }
  .match-btn-primary { background: white; color: var(--accent); border: none; padding: 11px 0; border-radius: 100px; font-family: 'DM Sans', sans-serif; font-size: 0.9375rem; font-weight: 500; cursor: pointer; width: 100%; margin-bottom: 10px; transition: opacity 0.15s; }
  .match-btn-primary:hover { opacity: 0.9; }
  .match-btn-skip { font-size: 0.8125rem; color: rgba(255,255,255,0.6); cursor: pointer; }

  /* EMPTY STATE */
  .empty-state {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    text-align: center;
    padding: 2rem;
  }
  .empty-icon { font-size: 52px; margin-bottom: 1rem; }
  .empty-state h3 { font-family: 'Instrument Serif', serif; font-size: 1.3rem; margin-bottom: 0.5rem; }
  .empty-state p { font-size: 0.875rem; color: var(--ink-muted); }

  /* ACTION BUTTONS */
  .action-row {
    display: flex;
    align-items: center;
    gap: 18px;
  }

  .action-btn {
    border-radius: 50%;
    border: 1px solid var(--border-strong);
    background: var(--white);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: transform 0.15s, border-color 0.15s, box-shadow 0.15s;
    flex-shrink: 0;
  }
  .action-btn:hover { transform: scale(1.08); }
  .action-btn:active { transform: scale(0.96); }

  .btn-undo { width: 48px; height: 48px; font-size: 18px; }
  .btn-undo:hover { border-color: var(--ink-muted); }

  .btn-pass { width: 56px; height: 56px; font-size: 22px; }
  .btn-pass:hover { border-color: var(--danger); box-shadow: 0 0 0 4px rgba(226,75,74,0.1); }

  .btn-like { width: 68px; height: 68px; font-size: 28px; background: var(--accent); border-color: var(--accent); }
  .btn-like:hover { transform: scale(1.1); box-shadow: 0 0 0 6px rgba(42,92,69,0.15); }

  .btn-boost { width: 48px; height: 48px; font-size: 18px; }
  .btn-boost:hover { border-color: #BA7517; }

  /* PROGRESS DOTS */
  .progress-dots { display: flex; gap: 6px; margin-top: 1.25rem; }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--border-strong); transition: background 0.2s, transform 0.2s; }
  .dot.active { background: var(--accent); transform: scale(1.3); }

  /* BOTTOM NAV */
  .bottom-nav {
    height: 60px;
    border-top: 1px solid var(--border);
    background: rgba(249,247,242,0.95);
    backdrop-filter: blur(12px);
    display: flex;
    align-items: center;
    justify-content: space-around;
    flex-shrink: 0;
  }
  .bnav-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    cursor: pointer;
    padding: 0 1rem;
    opacity: 0.4;
    transition: opacity 0.15s;
  }
  .bnav-item.active { opacity: 1; }
  .bnav-item span { font-size: 20px; }
  .bnav-label { font-size: 10px; font-weight: 500; color: var(--ink); letter-spacing: 0.04em; }
  .bnav-item.active .bnav-label { color: var(--accent); }
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">Better<span>Roomies</span></a>
  <div class="nav-right">
    <div class="match-pill">
      <div class="match-dot"></div>
      <span id="match-count">0 matches</span>
    </div>
    <div class="nav-icon">👤</div>
  </div>
</nav>

<div class="app-body">
  <div class="card-stack" id="card-stack">
    <div class="empty-state" id="empty-state">
      <div class="empty-icon">🏠</div>
      <h3>You've seen everyone</h3>
      <p>Check back soon — new roommates join every day.</p>
    </div>
  </div>

  <div class="action-row" id="action-row">
    <button class="action-btn btn-undo" onclick="triggerUndo()" aria-label="Undo">↩</button>
    <button class="action-btn btn-pass" onclick="triggerPass()" aria-label="Pass">✕</button>
    <button class="action-btn btn-like" onclick="triggerLike()" aria-label="Like" style="color:white;">♥</button>
    <button class="action-btn btn-boost" onclick="" aria-label="Boost">⚡</button>
  </div>

  <div class="progress-dots" id="progress-dots"></div>
</div>

<div class="bottom-nav">
  <div class="bnav-item active">
    <span>🏠</span>
    <div class="bnav-label">Discover</div>
  </div>
  <div class="bnav-item">
    <span>❤️</span>
    <div class="bnav-label">Matches</div>
  </div>
  <div class="bnav-item">
    <span>💬</span>
    <div class="bnav-label">Messages</div>
  </div>
  <div class="bnav-item">
    <span>👤</span>
    <div class="bnav-label">Profile</div>
  </div>
</div>

<script>
const profiles = [
  { name: 'Sophie', age: 24, city: 'Berlin', emoji: '👩‍🎨', bg: '#E8F2ED' },
  { name: 'Marcus', age: 27, city: 'Munich', emoji: '👨‍💻', bg: '#E6F1FB' },
  { name: 'Lena', age: 22, city: 'Hamburg', emoji: '👩‍🔬', bg: '#FBEAF0' },
  { name: 'Tom', age: 25, city: 'Frankfurt', emoji: '👨‍🎸', bg: '#FAEEDA' },
  { name: 'Nina', age: 23, city: 'Cologne', emoji: '👩‍💼', bg: '#EAF3DE' },
  { name: 'Felix', age: 26, city: 'Stuttgart', emoji: '👨‍🍳', bg: '#FAECE7' },
];

let current = 0;
let matches = 0;
let history = [];
let isDragging = false;
let startX = 0, startY = 0;
let activeCard = null;

function buildDots() {
  const el = document.getElementById('progress-dots');
  el.innerHTML = profiles.map((_, i) => `<div class="dot ${i === 0 ? 'active' : ''}" id="dot-${i}"></div>`).join('');
}

function updateDots() {
  profiles.forEach((_, i) => {
    const d = document.getElementById('dot-' + i);
    if (d) d.classList.toggle('active', i === current);
  });
}

function updateMatchCount() {
  const el = document.getElementById('match-count');
  el.textContent = matches + (matches === 1 ? ' match' : ' matches');
}

function createCard(idx, extraClass) {
  const p = profiles[idx];
  const card = document.createElement('div');
  card.className = 'profile-card ' + (extraClass || 'card-top');
  card.id = 'card-' + idx;
  card.innerHTML = `
    <div class="card-photo" style="background:${p.bg}">${p.emoji}</div>
    <div class="card-info">
      <div class="card-name-row">
        <span class="card-name">${p.name}</span>
        <span class="card-age">${p.age}</span>
      </div>
      <div class="card-city">📍 ${p.city}</div>
    </div>
    <div class="stamp stamp-like" id="stamp-like-${idx}">LIKE</div>
    <div class="stamp stamp-pass" id="stamp-pass-${idx}">PASS</div>
    <div class="match-overlay" id="match-overlay-${idx}">
      <div class="match-emoji">🎉</div>
      <div class="match-title">It's a match!</div>
      <div class="match-sub">${p.name} liked you too</div>
      <div class="match-avatars">
        <div class="match-avatar">😊</div>
        <div class="match-avatar">${p.emoji}</div>
      </div>
      <button class="match-btn-primary" onclick="dismissMatch(${idx})">Send a message</button>
      <div class="match-btn-skip" onclick="dismissMatch(${idx})">Keep swiping</div>
    </div>
  `;
  return card;
}

function renderStack() {
  const stack = document.getElementById('card-stack');
  stack.querySelectorAll('.profile-card').forEach(c => c.remove());

  if (current >= profiles.length) {
    document.getElementById('empty-state').style.display = 'flex';
    document.getElementById('action-row').style.opacity = '0.3';
    document.getElementById('action-row').style.pointerEvents = 'none';
    return;
  }

  document.getElementById('empty-state').style.display = 'none';
  document.getElementById('action-row').style.opacity = '1';
  document.getElementById('action-row').style.pointerEvents = 'auto';

  if (current + 2 < profiles.length) stack.appendChild(createCard(current + 2, 'card-z1'));
  if (current + 1 < profiles.length) stack.appendChild(createCard(current + 1, 'card-z2'));
  const top = createCard(current, 'card-top');
  stack.appendChild(top);
  attachDrag(top);
  updateDots();
}

function attachDrag(card) {
  const onDown = (x, y) => { isDragging = true; startX = x; startY = y; activeCard = card; card.style.transition = 'none'; };
  const onMove = (x, y) => {
    if (!isDragging) return;
    const dx = x - startX, dy = y - startY;
    card.style.transform = `translate(${dx}px,${dy}px) rotate(${dx * 0.07}deg)`;
    const ratio = Math.min(Math.abs(dx) / 80, 1);
    const ls = document.getElementById('stamp-like-' + current);
    const ps = document.getElementById('stamp-pass-' + current);
    if (ls) ls.style.opacity = dx > 20 ? ratio : 0;
    if (ps) ps.style.opacity = dx < -20 ? ratio : 0;
  };
  const onUp = (x) => {
    if (!isDragging) return;
    isDragging = false;
    const dx = x - startX;
    card.style.transition = 'transform 0.35s ease, opacity 0.35s ease';
    if (dx > 65) animateOut(card, 1, true);
    else if (dx < -65) animateOut(card, -1, false);
    else {
      card.style.transform = '';
      const ls = document.getElementById('stamp-like-' + current);
      const ps = document.getElementById('stamp-pass-' + current);
      if (ls) ls.style.opacity = 0;
      if (ps) ps.style.opacity = 0;
    }
    activeCard = null;
  };

  card.addEventListener('mousedown', e => onDown(e.clientX, e.clientY));
  document.addEventListener('mousemove', e => { if (isDragging && activeCard === card) onMove(e.clientX, e.clientY); });
  document.addEventListener('mouseup', e => { if (activeCard === card) onUp(e.clientX); });
  card.addEventListener('touchstart', e => onDown(e.touches[0].clientX, e.touches[0].clientY), { passive: true });
  card.addEventListener('touchmove', e => onMove(e.touches[0].clientX, e.touches[0].clientY), { passive: true });
  card.addEventListener('touchend', e => onUp(e.changedTouches[0].clientX));
}

function animateOut(card, dir, isLike) {
  const idx = current;
  card.style.transform = `translate(${dir * 700}px, 80px) rotate(${dir * 28}deg)`;
  card.style.opacity = '0';

  if (isLike && Math.random() > 0.35) {
    matches++;
    updateMatchCount();
    setTimeout(() => {
      const overlay = document.getElementById('match-overlay-' + idx);
      if (overlay) overlay.classList.add('show');
    }, 380);
    return;
  }

  history.push(idx);
  setTimeout(() => { current++; renderStack(); }, 380);
}

function dismissMatch(idx) {
  history.push(idx);
  current++;
  renderStack();
}

function triggerLike() {
  const card = document.getElementById('card-' + current);
  if (!card) return;
  card.style.transition = 'transform 0.35s ease, opacity 0.35s ease';
  const ls = document.getElementById('stamp-like-' + current);
  if (ls) ls.style.opacity = 1;
  animateOut(card, 1, true);
}

function triggerPass() {
  const card = document.getElementById('card-' + current);
  if (!card) return;
  card.style.transition = 'transform 0.35s ease, opacity 0.35s ease';
  const ps = document.getElementById('stamp-pass-' + current);
  if (ps) ps.style.opacity = 1;
  animateOut(card, -1, false);
}

function triggerUndo() {
  if (history.length === 0) return;
  current = history.pop();
  renderStack();
}

buildDots();
renderStack();
</script>
</body>
</html>
